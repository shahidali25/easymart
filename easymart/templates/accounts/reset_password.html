<!DOCTYPE html>
<html>
<head>
    <title>EasyMart - Reset Password</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: url("{% static 'images/bg.jpeg' %}") no-repeat center/cover;
        }

        .wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
        }

        .forgot-card {
            width: 430px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(25px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            color: white;
        }

        .brand {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            color: #ffc107;
        }

        .tagline {
            font-size: 13px;
            text-align: center;
            color: #ddd;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 12px;
            padding: 10px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #ffc107;
        }

        .btn-reset {
            background: #2e7d32;
            color: white;
            border-radius: 25px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: #1b5e20;
        }

        .error {
            color: #ff6b6b;
            font-size: 12px;
        }

        .success {
            color: #4caf50;
            font-size: 12px;
        }

        .footer-text {
            font-size: 13px;
            color: #ccc;
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #ffc107;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="wrapper">
<div class="forgot-card">

    <!-- BRAND -->
    <div class="brand">
        <i class="bi bi-basket2-fill"></i> EasyMart
    </div>
    <div class="tagline">
        Reset your password securely
    </div>

    <h5 class="text-center mb-3">Reset Password</h5>

    <!-- Email -->
    <input id="email" class="form-control mb-2" placeholder="Enter your email">
    
    <!-- OTP -->
    <input id="otp" class="form-control mb-2" placeholder="Enter OTP">

    <!-- New Password -->
    <input id="password" type="password" class="form-control mb-2" placeholder="New Password">

    <div id="form-error" class="error"></div>
    <div id="form-success" class="success"></div>

    <!-- Button -->
    <button id="resetBtn" class="btn btn-reset w-100 mt-2" onclick="resetPassword()">
        Reset Password
    </button>

    <!-- Footer -->
    <p class="footer-text">
        Back to
        <a href="{% url 'accounts:login' %}">Login</a>
    </p>

</div>
</div>

<script>

function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken'))
        ?.split('=')[1];
}

// ✅ Auto-fill email from URL
const params = new URLSearchParams(window.location.search);
const emailParam = params.get("email");
if (emailParam) {
    document.getElementById("email").value = emailParam;
}

function setLoading(btn, state) {
    if (state) {
        btn.disabled = true;
        btn.innerText = "Please wait...";
    } else {
        btn.disabled = false;
        btn.innerText = "Reset Password";
    }
}

function resetPassword() {

    let email = document.getElementById('email').value.trim();
    let otp = document.getElementById('otp').value.trim();
    let password = document.getElementById('password').value.trim();
    let btn = document.getElementById('resetBtn');

    document.getElementById('form-error').innerText = "";
    document.getElementById('form-success').innerText = "";

    if (!email || !otp || !password) {
        document.getElementById('form-error').innerText = "All fields are required";
        return;
    }

    if (password.length < 5) {
        document.getElementById('form-error').innerText = "Password must be at least 5 characters";
        return;
    }

    setLoading(btn, true);

    fetch('/accounts/api/verify-otp/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCSRFToken()
        },
        body: JSON.stringify({
            email: email,
            otp: otp,
            password: password,
            purpose: "reset"   // ✅ IMPORTANT
        })
    })
    .then(res => res.json())
    .then(data => {
        setLoading(btn, false);

        if (data.message) {
            document.getElementById('form-success').innerText = data.message;

            // ✅ Redirect to login
            setTimeout(() => {
                window.location.href = "/accounts/login/";
            }, 1500);

        } else {
            document.getElementById('form-error').innerText =
                data.error || "Something went wrong";
        }
    })
    .catch(() => {
        setLoading(btn, false);
        document.getElementById('form-error').innerText = "Server error. Try again.";
    });
}

</script>

</body>
</html>
